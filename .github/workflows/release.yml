name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check tag format
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            prerelease=false
          elif [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc(\.[0-9]+)?$ ]]; then
            prerelease=true
          else
            echo "Unsupported release tag: $tag" >&2
            echo "Use vX.Y.Z for releases or vX.Y.Z-rc / vX.Y.Z-rc.J for prereleases." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "title=Psycho Engine Fixes $tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang gcc-mingw-w64-i686 libclang-dev unzip zip

      - name: Install Rust target
        run: rustup target add i686-pc-windows-gnu

      - name: Build release archives
        run: bash ./.github/scripts/package_release.sh "${{ steps.tag.outputs.tag }}"

      - name: Verify archives
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail

          core_archive=".release/psycho-engine-fixes-$TAG.zip"
          helper_archive=".release/psycho-engine-fixes-nvse-helper-$TAG.zip"
          omv_archive=".release/omv-nvse-$TAG.zip"
          test -f "$core_archive"
          test -f "$helper_archive"
          test -f "$omv_archive"

          diff -u \
            <(printf '%s\n' \
              "dinput8.dll" \
              "syringe/psycho_engine_fixes.dll" \
              "syringe/psycho_engine_fixes.toml") \
            <(zipinfo -1 "$core_archive" | grep -v '/$' | sort)

          diff -u \
            <(printf '%s\n' \
              "Data/NVSE/plugins/psycho_engine_fixes_helper.dll") \
            <(zipinfo -1 "$helper_archive" | grep -v '/$' | sort)

          diff -u \
            <(printf '%s\n' \
              "Data/NVSE/plugins/omv.dll" \
              "Data/NVSE/plugins/omv/omv.toml" \
              "Data/NVSE/plugins/omv/shaders/01_depth_aware_cas.hlsl" \
              "Data/NVSE/plugins/omv/shaders/01_depth_aware_cas.toml" \
              "Data/NVSE/plugins/omv/shaders/03_fast_fxaa.hlsl" \
              "Data/NVSE/plugins/omv/shaders/03_fast_fxaa.toml") \
            <(zipinfo -1 "$omv_archive" | grep -v '/$' | sort)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          TITLE: ${{ steps.tag.outputs.title }}
          PRERELEASE: ${{ steps.tag.outputs.prerelease }}
        run: |
          set -euo pipefail

          assets=(
            ".release/psycho-engine-fixes-$TAG.zip"
            ".release/psycho-engine-fixes-nvse-helper-$TAG.zip"
            ".release/omv-nvse-$TAG.zip"
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            existing_assets="$(gh release view "$TAG" --json assets --jq '.assets[].name')"
            legacy_assets=(
              "psycho-engine-fixes-$TAG-aio.zip"
              "psycho-engine-fixes-helper-$TAG.zip"
              "syringe-$TAG.zip"
              "psycho-engine-fixes-config-$TAG.zip"
            )

            for asset in "${legacy_assets[@]}"; do
              if grep -Fxq "$asset" <<< "$existing_assets"; then
                gh release delete-asset "$TAG" "$asset" --yes
              fi
            done

            gh release upload "$TAG" "${assets[@]}" --clobber
            exit 0
          fi

          create_args=(
            release create "$TAG"
            "${assets[@]}"
            --title "$TITLE"
            --generate-notes
            --verify-tag
          )

          if [[ "$PRERELEASE" == "true" ]]; then
            create_args+=(--prerelease)
          fi

          gh "${create_args[@]}"
