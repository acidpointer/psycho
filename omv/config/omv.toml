[graphics]
# Load and apply screen-space effects.
#
# User shader files are loaded only from:
#   ./Data/NVSE/plugins/omv/shaders
#
# Supported file extensions:
#   .pso
#   .cso
#   .hlsl
#
# Files in ./Data/NVSE/plugins/omv/shaders are for user/developer shader experiments.
# Each sidecar TOML can set [shader].phase and [shader].passes from 1 to 8.
# .pso/.cso files must contain D3D9 pixel shader bytecode. .hlsl files are
# compiled once at startup as ps_3_0 with entry point Main.
#
# Embedded engine-owned effects are not represented by files in
# ./Data/NVSE/plugins/omv/shaders. Their settings live in [graphics.embedded_effects].
#
# Supported shader phases:
#   "scene_pre_image_space"
#       FalloutNV scene boundary immediately before vanilla
#       ProcessImageSpaceShaders. World and first-person depth have already
#       been captured. Use for AO/contact shadows that should not be drawn over
#       far fog.
#
#   "scene_post_image_space"
#       FalloutNV boundary immediately after vanilla ProcessImageSpaceShaders.
#       Reserved for effects that need to run after vanilla image-space but
#       before final user passes.
#
#   "final_image_space"
#       Final user pass. Use for AA, sharpening, color grading, debug overlays,
#       and effects that need full-frame first-person depth.
#
# true  = load and apply screen-space shader passes.
# false = keep the D3D hooks available for the menu, but do not apply
#         screen-space shader passes.
screen_space_shaders = true

# In-game shader menu.
#
# The menu is always enabled and can edit this config plus user shader sidecars
# without restarting the game.

# Virtual-key code used to toggle the menu.
#
# 0x2D = Insert
menu_toggle_key = 45

# How often the shader directory is checked for added/removed/changed shader
# files and sidecar TOML configs.
#
# Lower values react faster but touch the filesystem more often. Shader source
# recompilation still happens only when a shader file actually changes.
shader_scan_interval_ms = 200

# Optional depth input for shaders that need scene depth.
#
# Supported values:
#   "none"
#       No depth is bound; shader sampler s1 is cleared and constant c1.w is 0.
#
#   "fallout_new_vegas"
#       FalloutNV-specific scene boundaries. Captures world depth after
#       RenderWorldSceneGraph, captures world color after world rendering,
#       captures first-person depth as a mask after RenderFirstPerson, applies
#       "scene_pre_image_space" passes immediately before vanilla
#       ProcessImageSpaceShaders, then applies "scene_post_image_space" and
#       "final_image_space" passes after ProcessImageSpaceShaders.
#       The active D3D9 depth surface is resolved into owned INTZ textures with
#       RESZ. Does not call or depend on third-party graphics mods, and does
#       not patch DepthResolve/TESReloaded render callsites.
#       Existing "d3d9_auto" configs are accepted as an alias.
#
# Shader constants:
#   c1.w = 1 when depth is available, otherwise 0
#   c2.x = camera near plane
#   c2.y = camera far plane
#   c2.z = aspect ratio
#   c2.w = provider id, 2 for fallout_new_vegas
#   s1 = world scene depth
#   s2 = first-person depth mask
#   s3 = world color before first-person, or current color if unavailable
depth_provider = "fallout_new_vegas"

[graphics.embedded_effects.fast_ao]
# Engine-owned ambient occlusion pass. Fixed phase: scene_pre_image_space.
enabled = true
strength = 1.36793
radius_scale = 71.698273
max_radius_pixels = 7.6
range_scale = 0.07976293
debug_depth = false
depth_reversed = true
min_ambient = 0.1543535
luminance_protection = 0.45
stability = 0.5875
first_person_mask = 1.0
fog_fade = 1.0

[graphics.embedded_effects.contact_ao]
# Engine-owned contact ambient occlusion pass. Fixed phase: scene_pre_image_space.
enabled = true
strength = 0.4291376
radius_pixels = 4.3
range_scale = 0.031
bias_scale = 0.0
depth_reversed = true
min_ambient = 0.67
stability = 0.63
first_person_mask = 1.0
fog_fade = 1.0

[graphics.embedded_effects.blooming_hdr]
# Engine-owned bloom/HDR pass. Fixed phase: final_image_space.
enabled = true
bloom_intensity = 0.444
bright_threshold = 0.457
radius_pixels = 3.354
soft_knee = 0.219
exposure_bias = 0.055
highlight_shoulder = 0.682
saturation = 1.249
warmth = 0.543
shadow_lift = 0.228
dither = 0.459
debug_bloom = false
atmosphere = 0.38

[graphics.embedded_effects.sunshafts]
# Engine-owned sunshafts pass. Fixed phase: scene_post_image_space.
enabled = true
intensity = 0.3076724
exposure = 0.2062068
decay = 1.017446
density = 0.9709481
force = 1.015518
bright_threshold = 0.7188362
warmth = 0.9675861
first_person_occlusion = 1.0
sun_falloff = 1.088103
depth_reversed = true
debug_mask = false
sun_sample_px = 32
glare_radius = 0.07175863
occlusion_softness = 0.42

[graphics.embedded_effects.depth_of_field]
# Engine-owned high-quality depth of field. Fixed phase: scene_post_image_space.
# Native Fallout image-space DOF keeps ownership while it is active, preventing
# dialogue, iron-sight, VATS, and weather effects from being blurred twice.
enabled = true
respect_vanilla_dof = true
focus_mode = "auto"
quality = "high"
blur_style = "soft"
manual_focus_distance = 2000.0
focus_sample_radius = 0.055
focus_cluster_tolerance = 0.18
focus_deadband = 0.025
focus_near_seconds = 0.12
focus_far_seconds = 0.28
# Smooth optical falloff widths. Larger values keep a wider area gradually in
# focus; these controls do not create a hard sharp/blur boundary.
focus_range = 0.55
far_focus_range = 0.70
near_strength = 0.35
far_strength = 0.35
near_radius_pixels = 10.0
far_radius_pixels = 48.0
first_person_strength = 0.2
distant_blur_strength = 0.6413795
distant_blur_start = 21551.82
distant_blur_end = 55172.29
sky_blur_strength = 0.125
softness = 0.9517241

[graphics.native_pbr]
# Native material/PBR engine path.
#
# The object path uses the NVR-style rewrite contracts:
#   - shader wrapper side-table identity;
#   - SetShaderPackage and shader package lifetime contracts;
#   - SetShaders ownership point;
#   - precompiled shader cache and D3D resource creation outside the draw path;
#   - reflected/static constant and sampler contracts;
#
# Changes activate at the next Present boundary without requiring a restart.
enabled = true

# Object PBR registers:
#   c32.x is fixed to dielectric metallicness 0, c32.y roughness scale,
#   c32.z light scale, c32.w ambient scale, c33.x albedo saturation.
#
# Terrain/LandLOD PBR registers:
#   c89.x metallicness, c89.y roughness scale,
#   c89.z light scale, c89.w ambient scale,
#   c90.x use PBR, c90.y saturation, c90.z LOD noise scale,
#   c90.w LOD noise tile.
object_roughness_scale = 0.7516814
object_light_scale = 1.315789
object_ambient_scale = 0.8654971
object_albedo_saturation = 1.0
terrain_metallicness = 0.3143275
terrain_roughness_scale = 1.276213
terrain_light_scale = 1.202632
terrain_ambient_scale = 0.6906431
terrain_albedo_saturation = 0.7071348
terrain_lod_noise_scale = 1.0
terrain_lod_noise_tile = 3.19576

# Enable detailed per-draw contract telemetry. Keep this off during normal play.
debug_log_draws = false

[graphics.native_sky]
# Draw-scoped NVR-style native sky replacement. Unsupported sky passes remain vanilla.
enabled = true
atmosphere_thickness = 0.7068965
sun_influence = 1.291271
sun_strength = 1.517241
glare_strength = 0.8965517
star_strength = 1.0
star_twinkle = 1.0
cloud_transparency = 0.3610992
cloud_brightness = 1.305171
cloud_normals = false
use_sun_disk_color = false
sunset_red = 0.5
sunset_green = 0.0
sunset_blue = 0.03
sky_multiplier = 2.043103

[diagnostics]
# Enable verbose graphics-module logging.
#
# Log file:
#   <FalloutNV>/omv-latest.log
#
# true  = write detailed startup and shader loading diagnostics.
# false = write only normal informational logs.
debug_log = false
