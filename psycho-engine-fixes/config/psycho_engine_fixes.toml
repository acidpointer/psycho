# =============================================================================
# PSYCHO ENGINE FIXES - USER CONFIGURATION
# =============================================================================
#
# QUICK SETUP
#
# 1. Keep memory.allocator = 2 for the complete, recommended experience.
# 2. Keep all engine fixes and performance options enabled.
# 3. Keep the console and focused profiling tools disabled during normal play.
#
# Most users do not need to change anything. Every shipped setting is already
# selected for normal play. Individual switches exist so advanced users and
# support can isolate a specific mod conflict without disabling Psycho.
#
# HOW TO EDIT
#
# - true means ON; false means OFF.
# - memory.allocator uses the numbered modes explained below.
# - Save this file and fully restart the game after a change.
# - For troubleshooting, change one setting at a time. Restore it after the
#   test so the result is clear.
#
# SUPPORT
#
# Include the Psycho log with a crash or compatibility report. If Crash Logger
# is installed, include its log too:
#
#   <FalloutNV>/psycho-engine-fixes-latest.log
#   <FalloutNV>/CrashLogger.log
#

# =============================================================================
# MEMORY ALLOCATOR
# =============================================================================
[memory]

# The main user choice. This controls how much of the game's old memory system
# Psycho replaces.
#
# 2 = FULL GHEAP + SCRAP HEAP - RECOMMENDED
#     Best performance and the complete Psycho allocator design. Syringe
#     activates gheap at a proven pre-CRT startup boundary, before the game and
#     later plugin systems begin normal initialization. Gheap owns the main
#     allocation path and its initial backing from the start instead of taking
#     over after the 32-bit address space has already been fragmented.
#
# 1 = SCRAP HEAP ONLY - COMPATIBILITY FALLBACK
#     Replaces temporary scratch heaps but leaves the game's main object heap
#     unchanged. Use this when support asks you to isolate gheap, or when a
#     specific setup has a confirmed incompatibility with mode 2. The
#     performance improvement is smaller.
#
# 0 = VANILLA ALLOCATORS - DIAGNOSTIC ONLY
#     Disables both allocator replacements. Other engine fixes still work.
#     Use this to prove whether a problem is allocator-related; it provides no
#     allocator performance or memory-safety benefit.
#
# Technical background:
# Fallout: New Vegas is a 32-bit process with a limited virtual address space.
# Mode 2 validates and installs transactionally before normal game startup.
# Initial allocator backing is reserved while Psycho still has first ownership;
# additional small and medium ranges are reserved in bounded pieces as demand
# appears, and pages are committed only as needed. This preserves large holes
# for game and Direct3D allocations without surrendering early allocator
# control. Out-of-band free metadata does not overwrite freed game-object bytes;
# they remain readable until the cell is reused. Targeted lifetime guards cover
# proven stale-reader failures, while pressure monitoring and staged cleanup
# provide OOM recovery. The design balances performance, UAF protection, and
# address-space pressure rather than optimizing one by sacrificing the others.
#
# If mode 2 appears involved in a crash, test mode 1 and then mode 0. Keep the
# Psycho and CrashLogger logs from every test; the difference between these
# modes is much more useful than a log from only the crashing run.
allocator = 2

# Advanced gheap experiment. KEEP OFF for normal play.
#
# When enabled in mode 2, Psycho performs a blocking full Process Deferred
# Destruction (PDD) drain every 10 seconds instead of relying only on the game's
# bounded per-frame drain. It may reclaim deferred engine resources sooner, but
# it can cause hitches and is more aggressive toward stale-object lifetimes.
# Enable it only for a focused memory experiment requested by the developer.
#
# OOM: may reclaim resources sooner. UAF: less conservative. Performance: adds
# periodic blocking work. It has no useful effect in allocator modes 0 or 1.
gheap_periodic_pdd_purge = false

# =============================================================================
# ENGINE FIXES
# =============================================================================
[engine_fixes]

# USER GUIDANCE
#
# Keep every option in this section ON. These are narrowly targeted correctness
# and crash fixes, not visual preferences. Turning one off does not normally
# improve performance; it restores the specific broken vanilla behavior.
#
# Disable a single option only to test a suspected conflict. A "guard" is a
# safety check that rejects an invalid or not-yet-ready engine object instead of
# letting vanilla code dereference it and crash. Normal valid objects continue
# through the original path.

# --- Display ---------------------------------------------------------------

# Fixes incorrect fullscreen size and placement at startup, renderer reset,
# focus changes, and Alt-Tab. Leave ON unless another window-management mod has
# a confirmed conflict.
#
# Technical: repairs the audited bootstrap and transition callsites while
# leaving ordinary windowed calls unchanged. Existing borderless owners retain
# style and size control; Psycho applies only safe transition protections.
display_alt_tab = true

# --- Saves and loaded data -------------------------------------------------

# Prevents the game from claiming that a save succeeded when the file was only
# partly written or could not safely replace the previous save. Also rejects
# malformed changed records before they can overrun a load buffer. Leave ON.
#
# Technical: flushes and closes the completed temporary file, rotates the
# configured backups, and atomically promotes the new .fos. Failed promotion
# keeps or restores the old save when possible. Load checks use the engine's
# own rejection path and skip records whose source plugin is unavailable.
save_integrity_fix = true

# Prevents a pathfinding crash caused by a tiny invalid pointer where the game
# expects NavMeshInfo. The bad value is treated as "no path identity."
navmesh_low_pointer_guard = true

# Prevents corrupt container data from crashing save/load. Entries whose item
# type form is invalid are dropped before vanilla code dereferences them.
entrydata_invalid_form_guard = true

# Prevents corrupt ownership data from crashing the game or xNVSE. An invalid
# ExtraOwnership owner pointer is converted to "no owner."
extraownership_invalid_owner_guard = true

# Prevents a save-to-save transition crash when a deleted or unloading
# reference retains a stale linked-reference child list. Only that corrupt list
# is ignored during cleanup.
linked_ref_children_stale_list_guard = true

# Prevents activation and linked-reference crashes when ExtraLinkedRef targets
# a reference with a broken base form. The invalid optional link is skipped.
linked_ref_target_base_form_guard = true

# --- Ragdoll and Havok physics --------------------------------------------

# Skips a ragdoll update only while its bone pointer table is incomplete. The
# next frame tries again, avoiding a crash without disabling the ragdoll.
ragdoll_null_bone_guard = true

# Treats a best-effort ragdoll penetration raycast as "no hit" for one frame
# when its Havok phantom has already detached from the physics world.
ragdoll_detached_phantom_guard = true

# Removes NULL entries from an hkpWorld add-entity batch before Havok writes
# through them. Valid entities in the same batch are still added.
havok_add_entity_batch_null_guard = true

# Removes NULL entries from Havok's pending-add array before the engine flushes
# it. Valid pending entities continue normally.
havok_pending_add_null_guard = true

# Skips invalid collision pairs before Havok dispatches through its collision-
# agent table. Valid narrowphase collision work is unchanged.
havok_narrowphase_invalid_pair_guard = true

# Skips the AddedToWorld callback when Havok supplies a NULL entity pointer.
havok_post_add_null_entity_guard = true

# Prevents an AI-thread Havok crash caused by rereading a broadphase slot after
# agent work has already made that slot NULL.
#
# Technical: the reread supplies an argument that the unlock wrapper does not
# use. Psycho preserves the critical-section unlock and removes only the unsafe
# dead-argument load.
havok_remove_agent_null_reread_guard = true

# --- Allocation failure and object lifetime -------------------------------

# Prevents two known out-of-memory paths from writing an alignment marker or
# zeroing memory through a NULL allocation result. The failure is returned to
# the caller instead of becoming an immediate address-zero crash.
#
# Technical: only the two unsafe allocator consumers are replaced; Psycho does
# not add a check to the global memset hot path.
memset_null_dst_guard = true

# Fixes ownership of LowProcess generic-location lists and contains already-
# corrupt entries when saving. This prevents non-owned reference payloads from
# being freed and invalid forms from being serialized as live references.
#
# Technical: list nodes are removed without freeing their TESObjectREFR
# payloads. The fix remains compatible with mods that replace the cleanup
# vtable slots by wrapping the current valid owner.
lowprocess_generic_locations_fix = true

# Prevents queued tasks from reaching virtual callbacks or final-release paths
# after their intrusive reference count has already reached zero.
#
# This is an engine lifetime fix, not a gheap workaround, and remains useful in
# every allocator mode.
queued_task_lifetime_guard = true

# =============================================================================
# NATIVE IO
# =============================================================================
[io]

# Uses exactly two native IOManager workers. Psycho expands per-thread map
# capacity and serializes process-global exterior-cell, SpeedTree Compute, and
# static vertex-buffer state while unrelated IO tasks remain parallel.
parallel_enabled = true

# =============================================================================
# LOD STREAMING
# =============================================================================
[lod]

# Improves terrain, distant-object, and distant-tree loading while correcting
# the cell-wide handoff from distant geometry to real reference 3D.
enabled = true

# Requests native LOD work before the vanilla visibility boundary. This moves
# existing IO and main-thread completion work earlier; it does not add a new
# worker, queue, or scene publication path.
prefetch_enabled = true

# Replaces vanilla lifetime-total readiness with current cell/reference
# identity. Keep ON: removed references must not authorize later retirement.
handoff_fix_enabled = true

# Raises native LOD tasks and their dependencies to native priority 0, the
# highest scheduling priority. Task classes and their ordering remain unchanged.
priority_boost_enabled = true

# Request object and tree blocks 35 percent earlier, then retain them to 150
# percent of their original distance to prevent boundary churn.
object_prefetch_multiplier = 1.35
object_retention_multiplier = 1.50
tree_prefetch_multiplier = 1.35
tree_retention_multiplier = 1.50

# Terrain uses smaller margins because recursive quadtree expansion grows work
# and memory more quickly than object or tree blocks.
terrain_prefetch_multiplier = 1.10
terrain_retention_multiplier = 1.20

# =============================================================================
# PERFORMANCE
# =============================================================================
[performance]

# Keep these options ON for normal play. Turn one off only to isolate the named
# system during troubleshooting.

# Replaces the game's old Mersenne Twister with a much faster per-thread random
# generator. Output ranges and special game call cases remain compatible.
#
# Technical: the exact random sequence is intentionally different from
# vanilla. Turn this off if testing a mod that depends on vanilla's deterministic
# RNG sequence rather than only its numeric range.
rng = true

# Uses a faster zlib implementation for compressed archives and game data.
# This can reduce decompression time during startup, save loading, and cell
# transitions. It does not change textures, meshes, plugins, save format, or
# image quality.
#
# Technical: the replacement preserves the zlib stream contract and verifies
# the Adler-32 checksum. It changes how bytes are decompressed, not the bytes
# produced. Turn it off only to isolate an archive/decompression conflict.
zlib = true

# Reduces the first-frame stall after loading a save by running process-manager
# reconciliation before the successful load returns. Keep ON for normal play.
#
# Technical: vanilla performs the same reconciliation in the first rendered
# frame. This guarded prepass drains accumulated quest, cell, and reference work
# while the load transition is still active. It may move a small amount of work
# into the loading transition so the first playable frame has less backlog.
post_load_reconciliation_prepass = true

# =============================================================================
# DIAGNOSTICS
# =============================================================================
[diagnostics]

# Adds detailed diagnostic messages to psycho-engine-fixes-latest.log.
# Recommended ON: these messages are important for allocator and crash reports.
#
# Turning this off does NOT disable the log file. Normal informational and
# warning messages are still written; only verbose debug detail is omitted.
debug_log = true

# Opens a separate Windows console showing live log output. Useful when
# developing or watching startup in real time; unnecessary during normal play.
console = false

# Records high-resolution timings around many engine hooks and writes [HITCH]
# reports. Enable only while reproducing a specific hitch, then turn it off.
#
# This adds timer reads to hot paths and requires debug_log = true for timing
# summaries. Normal hang, memory-pressure, and guard diagnostics do not require
# it. Slow radio scans also receive [RADIO_SCAN] attribution while enabled.
hitch_profiling = false

# Records the last 256 queued-task retain, release, dispatch, and rejection
# events for focused lifetime-crash research. It has no normal-play benefit.
#
# Enable only when requested. It requires queued_task_lifetime_guard = true;
# keep debug_log = true so a triggered trace can be written to the log.
task_lifetime_trace = false

# Records the last 256 meaningful LOD membership, readiness, gate, and reset
# events. Enable only while investigating LOD behavior; aggregate streaming
# demand counters remain available without it.
lod_streaming_trace = false
