[graphics]
# Load and apply screen-space effects.
#
# User shader files are loaded only from:
#   ./mods/psycho_shaders
#
# Supported file extensions:
#   .pso
#   .cso
#   .hlsl
#
# Files in ./mods/psycho_shaders are for user/developer shader experiments.
# Each sidecar TOML can set [shader].phase and [shader].passes from 1 to 8.
# .pso/.cso files must contain D3D9 pixel shader bytecode. .hlsl files are
# compiled once at startup as ps_3_0 with entry point Main.
#
# Embedded engine-owned effects are not represented by files in
# ./mods/psycho_shaders. Their settings live in [graphics.embedded_effects].
#
# Supported shader phases:
#   "scene_pre_image_space"
#       FalloutNV scene boundary immediately before vanilla
#       ProcessImageSpaceShaders. World and first-person depth have already
#       been captured. Use for AO/contact shadows that should not be drawn over
#       far fog.
#
#   "scene_post_image_space"
#       FalloutNV boundary immediately after vanilla ProcessImageSpaceShaders.
#       Reserved for effects that need to run after vanilla image-space but
#       before final user passes.
#
#   "final_image_space"
#       Final user pass. Use for AA, sharpening, color grading, debug overlays,
#       and effects that need full-frame first-person depth.
#
# true  = load and apply screen-space shader passes.
# false = keep the D3D hooks available for the menu, but do not apply
#         screen-space shader passes.
screen_space_shaders = true

# In-game shader menu.
#
# The menu is always enabled and can edit this config plus user shader sidecars
# without restarting the game.

# Virtual-key code used to toggle the menu.
#
# 0x2D = Insert
menu_toggle_key = 45

# How often the shader directory is checked for added/removed/changed shader
# files and sidecar TOML configs.
#
# Lower values react faster but touch the filesystem more often. Shader source
# recompilation still happens only when a shader file actually changes.
shader_scan_interval_ms = 200

# Optional depth input for shaders that need scene depth.
#
# Supported values:
#   "none"
#       No depth is bound; shader sampler s1 is cleared and constant c1.w is 0.
#
#   "fallout_new_vegas"
#       FalloutNV-specific scene boundaries. Captures world depth after
#       RenderWorldSceneGraph, captures world color after world rendering,
#       captures first-person depth as a mask after RenderFirstPerson, applies
#       "scene_pre_image_space" passes immediately before vanilla
#       ProcessImageSpaceShaders, then applies "scene_post_image_space" and
#       "final_image_space" passes after ProcessImageSpaceShaders.
#       The active D3D9 depth surface is resolved into owned INTZ textures with
#       RESZ. Does not call or depend on third-party graphics mods, and does
#       not patch DepthResolve/TESReloaded render callsites.
#       Existing "d3d9_auto" configs are accepted as an alias.
#
# Shader constants:
#   c1.w = 1 when depth is available, otherwise 0
#   c2.x = camera near plane
#   c2.y = camera far plane
#   c2.z = aspect ratio
#   c2.w = provider id, 2 for fallout_new_vegas
#   s1 = world scene depth
#   s2 = first-person depth mask
#   s3 = world color before first-person, or current color if unavailable
depth_provider = "fallout_new_vegas"

[graphics.embedded_effects.fast_ao]
# Engine-owned ambient occlusion pass. Fixed phase: scene_pre_image_space.
enabled = true
strength = 0.73
radius_scale = 75.5
max_radius_pixels = 7.6
range_scale = 0.076
debug_depth = false
depth_reversed = true
min_ambient = 0.18
luminance_protection = 0.45
stability = 0.65
first_person_mask = 1.0
fog_fade = 1.0

[graphics.embedded_effects.contact_ao]
# Engine-owned contact ambient occlusion pass. Fixed phase: scene_pre_image_space.
enabled = true
strength = 0.58
radius_pixels = 4.3
range_scale = 0.031
bias_scale = 0.0
depth_reversed = true
min_ambient = 0.67
stability = 0.63
first_person_mask = 1.0
fog_fade = 1.0

[graphics.embedded_effects.blooming_hdr]
# Engine-owned bloom/HDR pass. Fixed phase: final_image_space.
enabled = true
bloom_intensity = 0.444
bright_threshold = 0.457
radius_pixels = 3.354
soft_knee = 0.219
exposure_bias = 0.055
highlight_shoulder = 0.682
saturation = 1.249
warmth = 0.543
shadow_lift = 0.228
dither = 0.459
debug_bloom = false
atmosphere = 0.38

[graphics.embedded_effects.sunshafts]
# Engine-owned sunshafts pass. Fixed phase: scene_post_image_space.
enabled = true
intensity = 0.34
exposure = 0.52
decay = 1.005
density = 1.08
force = 2.05
bright_threshold = 0.56
warmth = 0.64
first_person_occlusion = 1.0
sun_falloff = 1.05
depth_reversed = true
debug_mask = false
sun_sample_px = 32
glare_radius = 0.044
occlusion_softness = 0.42

[graphics.native_pbr]
# Native material/PBR engine path.
#
# Psycho always installs the safe native hooks at startup when their target
# prologues are vanilla. If another graphics mod already owns a target, hooks
# are skipped and the game remains on the vanilla path.
#
# When enabled below, Psycho replaces eligible PPLighting material pixel
# shaders with embedded Native PBR shader variants. The proven draw-time
# contract:
#   - PPLighting selector setup +0xF0/+0xF4 material-array side table
#   - BSShader::SetShaders current NiD3DPass context
#   - current pass shader-interface apply context
#   - NiDX9RenderState::SetTexture final 16-stage texture cache
#   - PPLighting shader-family membership from proven vanilla global arrays
#   - NVR ObjectTemplate ADTS non-SI/non-HAIR object ABIs:
#     base/OPT/LOD, projected shadow, LIGHTS=2, LIGHTS=2 projected shadow,
#     specular, specular projected shadow, specular LIGHTS=2, and specular
#     LIGHTS=2 projected shadow
#   - NVR ObjectTemplate ADTS10 object ABIs:
#     LIGHTS=9, LIGHTS=4, LIGHTS=4 OPT, SPECULAR LIGHTS=4, and
#     SPECULAR LIGHTS=4 OPT
#   - land LOD ABI from NewVegasReloaded_release terrain/SLS2006 references:
#     vertex group C index 2 and pixel group B index 3 are replaced together;
#     c31 remains vanilla LODTexParams and PBR uses c32/c33 only on that path
#
# SI/HAIR, parallax, and pure only-light helper passes remain on vanilla
# shaders until their texture and pass contracts are implemented separately.
#
# This is a runtime shader toggle. It does not control hook installation.
enabled = true

# NVR-compatible PBR registers:
#   c32.y roughness scale, c32.z light scale, c32.w ambient scale,
#   c33.x albedo saturation.
roughness_scale = 0.7789999842643738
light_scale = 1.5429999828338623
ambient_scale = 1.9220000505447388
albedo_saturation = 1.0169999599456787

# Log a small bounded native draw-context sample for contract debugging.
debug_log_draws = false

[diagnostics]
# Enable verbose graphics-module logging.
#
# Log file:
#   <FalloutNV>/psycho-graphics-latest.log
#
# true  = write detailed startup and shader loading diagnostics.
# false = write only normal informational logs.
debug_log = true
