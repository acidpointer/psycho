[general]
console = false         # Show console window on game startup

[logger]
debug = true            # Show debug logs (enable when prepare problem report)

[memory]
heap_replacer = true    # Enable heap replacer
light_mode = false      # Scrap-heap only, skip gheap. Use on heavy modlists where gheap can't fit.
gheap_task_release_guard = true # Guard IO task release against stale task/vtable crashes.
gheap_periodic_full_pdd = false # Experimental: old 10s blocking full PDD purge.
gheap_default_heap_probe = false # Diagnostic: trap first later access to old Default heap live page.

[perf]
rng = true              # Enable RNG (random number generator) replacer

[zlib]
enabled = true          # Enable zlib replacer

[display]
tweaks = true           # Enable display tweaks (alt-tab fix)

[debug]
vas_scan = true        # One-line VA summary at preload + DeferredInit (tuning only)
vas_probe = true       # One-line VirtualAlloc-ladder probe at preload (tuning only)
